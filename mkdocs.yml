site_name: CFLT — Core-First Language Theory
site_description: A unified theoretical framework for cross-linguistic communication, second-language pedagogy, and human-AI cognitive alignment.
site_url: https://cflt.center
repo_url: https://github.com/corefirst/cflt
repo_name: corefirst/cflt
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  custom_dir: overrides
  language: en
  logo: assets/cflt-logo.svg
  favicon: assets/cflt-logo.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.path
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tabs.link

plugins:
  - search
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
          link: /
          site_name: CFLT — Core-First Language Theory
        - locale: zh
          name: 简体中文
          build: true
          link: /zh/
          site_name: CFLT — 核心优先语言理论
          nav_translations:
            Home: 首页
            Manifesto: 宣言
            Strategic Vision: 战略愿景
            Foundations: 理论基础
            Core Concept: 核心概念
            Pedagogy: 教育学基础
            Linguistics: 语言学基础
            Neuroscience: 神经科学基础
            Logic: 逻辑学基础
            Mathematics: 数学基础
            LLM & AI: 大语言模型基础
            Phonetics: 语音学基础
            Sociolinguistics: 社会语言学基础
            Methodology: 实践指南
            Human Learning: 人类学习
            LLM Prompting: LLM 提示词工程
            Complex Structures: 复杂句式与递归
            Software Architecture: 软件架构实现
            Curriculum Engineering: 课程工程开发
            Evaluation & Metrics: 评估与量化指标
            Reference Implementations: 参考实现
            Bibliography: 参考文献

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Manifesto: manifesto.md
  - Strategic Vision: vision.md
  - Foundations:
      - Core Concept: foundations/core-concept.md
      - Linguistics: foundations/linguistics.md
      - Phonetics: foundations/phonetics.md
      - Sociolinguistics: foundations/sociolinguistics.md
      - Pedagogy: foundations/pedagogy.md
      - Neuroscience: foundations/neuroscience.md
      - Logic: foundations/logic.md
      - Mathematics: foundations/mathematics.md
      - LLM & AI: foundations/llm.md
  - Methodology:
      - Human Learning: methodology/human-learning.md
      - Complex Structures: methodology/complex-structures.md
      - LLM Prompting: methodology/llm-prompting.md
      - Software Architecture: methodology/software-architecture.md
      - Curriculum Engineering: methodology/curriculum-engineering.md
      - Evaluation & Metrics: methodology/evaluation-metrics.md
  - Reference Implementations: reference-implementations.md
  - Bibliography: bibliography.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/corefirst/cflt
  generator: false
