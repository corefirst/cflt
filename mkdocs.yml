site_name: CFLT — Core-First Language Theory
site_description: A unified theoretical framework for cross-linguistic communication, second-language pedagogy, and human-AI cognitive alignment.
site_url: https://cflt.center
repo_url: https://github.com/corefirst/cflt
repo_name: corefirst/cflt
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  custom_dir: overrides
  language: en
  logo: assets/cflt-mark.svg
  favicon: assets/cflt-logo.svg
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.path
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tabs.link

plugins:
  - search
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
          link: /
          site_name: CFLT — Core-First Language Theory
          copyright: '<span>© 2026 <a href="https://cflt.center">CFLT Core Team</a></span> <span>· Licensed under <a href="https://creativecommons.org/licenses/by/4.0/">CC BY 4.0</a></span> <span>· <a href="/contributors/">Contributors</a></span>'
        - locale: zh
          name: 简体中文
          build: true
          link: /zh/
          site_name: CFLT — 核心优先语言理论
          copyright: '<span>© 2026 <a href="https://cflt.center">CFLT 核心团队</a></span> <span>· 采用 <a href="https://creativecommons.org/licenses/by/4.0/">CC BY 4.0</a> 许可协议</span> <span>· <a href="/zh/contributors/">贡献者名单</a></span>'
          nav_translations:
            Home: 首页
            Theory: 理论核心
            Manifesto: 宣言
            Strategic Vision: 战略愿景
            Science (Foundations): 科学基础
            Overview: 总览
            Core Disambiguation: 核心消歧
            Linguistics: 语言学
            Pedagogy: 教育学
            Neuroscience: 神经科学
            Logic & Speech Acts: 逻辑与言语行为
            Mathematics & Info Theory: 数学与信息论
            LLM & AI: 大语言模型
            Phonetics: 语音学
            Sociolinguistics: 社会语言学
            Practice (Methodology): 实践方法
            Human Learning: 人类学习
            LLM Prompting: LLM 提示工程
            Empirical Agenda: 实证研究议程
            Slot Disambiguation: 槽位消歧参考
            Complex Structures: 复杂句式与递归
            Curriculum Engineering: 课程工程
            Software Architecture: 软件架构
            Evaluation & Metrics: 评估与量化指标
            Language Pair Guides: 语言对指南
            Chinese ↔ Japanese: 汉语 ↔ 日语
            English ↔ Chinese: 英语 ↔ 汉语
            Chinese ↔ English: 汉语 ↔ 英语
            English ↔ Japanese: 英语 ↔ 日语
            Ecosystem: 生态
            Reference Implementations: 参考实现
            Contributors: 贡献者
            "Validation (Experiments)": 验证与实验
            Verification Plan: 验证计划
            "Part 1: Human-CFLT Alignment": 第一部分：人类-CFLT 对齐
            "Part 2: LLM Self-Consistency": 第二部分：LLM 自我一致性
            Experiment Log: 实验日志
            Future Work: 未来工作
            Cognitive Translation Layer: 认知翻译层
            Appendix: 附录
            Glossary: 术语表
            Bibliography: 参考文献
            "Project Source (GitHub)": 项目源码 (GitHub)

extra_css:
  - assets/extra.css

extra_javascript:
  - javascripts/resume.js

hooks:
  - overrides/hooks.py

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify {kwds: {case: lower}}
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Theory:
      - Manifesto: manifesto.md
      - Strategic Vision: vision.md
  - Science (Foundations):
      - Overview: foundations/core-concept.md
      - Core Disambiguation: foundations/core-disambiguation.md
      - Linguistics: foundations/linguistics.md
      - Pedagogy: foundations/pedagogy.md
      - Neuroscience: foundations/neuroscience.md
      - Logic & Speech Acts: foundations/logic.md
      - Mathematics & Info Theory: foundations/mathematics.md
      - LLM & AI: foundations/llm.md
      - Phonetics: foundations/phonetics.md
      - Sociolinguistics: foundations/sociolinguistics.md
  - Practice (Methodology):
      - Human Learning: methodology/human-learning.md
      - LLM Prompting: methodology/llm-prompting.md
      - Empirical Agenda: methodology/empirical-agenda.md
      - Slot Disambiguation: methodology/slot-disambiguation.md
      - Complex Structures: methodology/complex-structures.md
      - Curriculum Engineering: methodology/curriculum-engineering.md
      - Evaluation & Metrics: methodology/evaluation-metrics.md
      - Language Pair Guides:
          - Overview: methodology/language-pair-guides/index.md
          - Chinese ↔ Japanese: methodology/language-pair-guides/zh-ja.md
          - English ↔ Chinese: methodology/language-pair-guides/en-zh.md
          - Chinese ↔ English: methodology/language-pair-guides/zh-en.md
          - English ↔ Japanese: methodology/language-pair-guides/en-ja.md
  - "Validation (Experiments)":
      - Verification Plan: methodology/llm-verification-plan.md
      - "Part 1: Human-CFLT Alignment": methodology/llm-part1-verification.md
      - "Part 2: LLM Self-Consistency": methodology/llm-part2-verification.md
      - Experiment Log: methodology/experiment-log.md
  - Future Work:
      - Cognitive Translation Layer: future/cognitive-translation-layer.md
  - Ecosystem:
      - Reference Implementations: reference-implementations.md
      - Contributors: contributors.md
  - Appendix:
      - Bibliography: bibliography.md
      - Glossary: glossary.md
      - "Project Source (GitHub)": https://github.com/corefirst/cflt

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/corefirst/cflt
  generator: false
