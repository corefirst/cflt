site_name: CFLT — Core-First Language Theory
site_description: A unified theoretical framework for cross-linguistic communication, second-language pedagogy, and human-AI cognitive alignment.
site_url: https://cflt.center
repo_url: https://github.com/corefirst/cflt
repo_name: corefirst/cflt
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  custom_dir: overrides
  language: en
  logo: assets/cflt-logo.svg
  favicon: assets/cflt-logo.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: slate
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: slate
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - toc.follow

plugins:
  - search
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
          site_name: CFLT — Core-First Language Theory
        - locale: zh
          name: 中文
          build: true
          site_name: CFLT — 核心优先语言理论
          nav_translations:
            Home: 首页
            Manifesto: 宣言
            Strategic Vision: 战略愿景
            Foundations: 理论基础
            Core Concept: 核心概念
            Pedagogy: 教育学基础
            Linguistics: 语言学基础
            Logic: 逻辑学基础
            Mathematics: 数学基础
            LLM & AI: 大语言模型基础
            Methodology: 实践指南
            Human Learning: 人类学习
            LLM Prompting: LLM 提示词工程
            Reference Implementations: 参考实现
            Bibliography: 参考文献

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Manifesto: manifesto.md
  - Strategic Vision: vision.md
  - Foundations:
      - Core Concept: foundations/core-concept.md
      - Pedagogy: foundations/pedagogy.md
      - Linguistics: foundations/linguistics.md
      - Neuroscience: foundations/neuroscience.md
      - Logic: foundations/logic.md
      - Mathematics: foundations/mathematics.md
      - LLM & AI: foundations/llm.md
  - Methodology:
      - Human Learning: methodology/human-learning.md
      - LLM Prompting: methodology/llm-prompting.md
  - Reference Implementations: reference-implementations.md
  - Bibliography: bibliography.md

extra:
  alternate:
    - name: English
      link: /
      lang: en
    - name: 中文
      link: /zh/
      lang: zh
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/corefirst/cflt
